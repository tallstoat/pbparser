edition = "2023";

package editiontest;

option java_package = "com.example.edition";

enum Status {
  STATUS_UNKNOWN = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
}

message Request {
  string name = 1;
  optional int32 priority = 2;
  repeated string tags = 3;
  Status status = 4;

  extensions 100 to 200;
}

message Response {
  string result = 1;
  optional bool success = 2;
}

extend Request {
  string extra_info = 100;
}

service MyService {
  rpc Process(Request) returns (Response);
  rpc StreamProcess(stream Request) returns (stream Response);
}
