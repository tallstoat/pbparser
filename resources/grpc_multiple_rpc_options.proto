syntax = "proto3";
package multiopts;

message Req {
  string id = 1;
}

message Resp {
  string result = 1;
}

service AnnotatedService {
  rpc HeavilyAnnotated (Req) returns (Resp) {
    option deprecated = true;
    option (google.api.http) = {
      post: "/v1/annotated"
      body: "*"
    };
    option (custom.auth) = {
      required: true
      roles: "admin"
    };
    option idempotency_level = IDEMPOTENT;
  }

  // RPC with only simple options
  rpc SimpleOptions (Req) returns (Resp) {
    option deprecated = true;
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}
