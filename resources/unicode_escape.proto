syntax = "proto3";
package unicodeescapepkg;

option (hex_opt) = "tab\x09here";
option (unicode_opt) = "smile\u263Aface";
option (big_unicode_opt) = "big\U0001F600end";
option (octal_opt) = "bell\007end";
option (mixed_opt) = "a\nb\tc\x41d";

message Foo {
  string name = 1 [default = "\x48\x65\x6C\x6Co"];
  int32 id = 2;
}
